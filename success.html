<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Submitted</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            display: grid;
            place-items: center; /* Perfect center */
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #161337, #4d2a71);
            padding: 20px;
        }

        .success-container {
            background: rgba(70, 60, 148, 0.811);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 15px 40px rgba(28, 109, 189, 0.892);
        }

        h1 {
            margin-bottom: 15px;
        }

        p {
            line-height: 1.6;
        }
@keyframes fadeSlideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
.animate-title {
    opacity: 0; 
    animation: fadeSlideUp 1s ease forwards; /* runs animation once */
}
.animate-text {
    opacity: 0;
    animation: fadeSlideUp 1s ease forwards;
    animation-delay: 0.4s; /* slight delay so paragraph appears after heading */
}
    </style>
</head>

<body>

<div class="success-container">
    <h1 class="animate-title">Application Submitted</h1>
    <p class="animate-text">
        There is nothing to show here as it is a sample website.
    </p>
</div>
</body>
</html>
